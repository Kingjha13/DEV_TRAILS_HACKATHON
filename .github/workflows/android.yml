name: Build APK (No Risk) 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install -y gradle

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk ShieldNet.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}
          name: ShieldNet Build
          files: ShieldNet.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}